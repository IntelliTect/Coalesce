name: ~Build

on:
  workflow_call:
    inputs:
      COALESCE_VERSION:
        required: true
        type: string

jobs:
  build-dotnet:
    runs-on: ubuntu-latest

    env:
      COALESCE_VERSION: ${{inputs.COALESCE_VERSION}}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - uses: ./.github/actions/setup-js
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release /WarnAsError
      - run: dotnet test --no-build --configuration Release
      - run: dotnet pack --no-build --configuration Release -p:PackageOutputPath="$(pwd)/out/packages"

      - name: "Upload Artifact: NuGet Packages"
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: out/packages

  validate-vue3-playground:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playground/Coalesce.Web.Vue3

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet
      - uses: ./.github/actions/setup-js

      - run: pnpm coalesce
      - run: pnpm build
      - run: dotnet build --configuration Release

  build-coalesce-vue:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/coalesce-vue

    env:
      COALESCE_VERSION: ${{inputs.COALESCE_VERSION}}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-js

      - run: pnpm lint

      - name: pnpm test
        run: pnpm test -- --coverage --reporter=default --reporter=junit --outputFile coalesce-vue.results.xml

      - run: pnpm build
      - run: pnpm pack

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: coalesce-vue
          path: src/coalesce-vue/coalesce-vue*.tgz

  build-eslint-plugin-coalesce:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/eslint-plugin-coalesce

    env:
      COALESCE_VERSION: ${{inputs.COALESCE_VERSION}}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-js

      - name: pnpm test
        run: pnpm test

      - run: pnpm build
      - run: pnpm pack

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: eslint-plugin-coalesce
          path: src/eslint-plugin-coalesce/*.tgz

  build-coalesce-mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/coalesce-mcp

    env:
      COALESCE_VERSION: ${{inputs.COALESCE_VERSION}}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-js

      - name: pnpm test
        run: pnpm test

      - name: update template dependency versions
        shell: pwsh
        working-directory: ./templates/Coalesce.Vue.Template
        run: ./Update-CoalesceVersions.ps1 -Version $env:COALESCE_VERSION

      - run: pnpm build
      - run: pnpm pack

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: coalesce-mcp
          path: src/coalesce-mcp/*.tgz

  build-coalesce-vue-vuetify3:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/coalesce-vue-vuetify3

    env:
      COALESCE_VERSION: ${{inputs.COALESCE_VERSION}}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-js

      - run: pnpm build-local-deps # build coalesce-vue
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

      - run: pnpm pack

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: coalesce-vue-vuetify3
          path: src/coalesce-vue-vuetify3/*.tgz

  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: docs

    steps:
      - uses: actions/checkout@v6
        with:
          # fetch all commits to get last updated time or other git log info
          fetch-depth: 0

      - uses: ./.github/actions/setup-js

      - name: Build docs
        run: pnpm build

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: docs/.vitepress/dist

  build-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
        working-directory: ./templates/Coalesce.Vue.Template
    env:
      COALESCE_VERSION: ${{ inputs.COALESCE_VERSION }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet

      - name: "Set dependency versions"
        run: ./Update-CoalesceVersions.ps1 -Version $env:COALESCE_VERSION

      - name: dotnet pack
        run: dotnet pack -p:Version=$env:COALESCE_VERSION -p:PackageOutputPath="${{ github.workspace }}/out/packages"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: template-packages
          path: ${{ github.workspace }}/out/packages

  validate-template:
    runs-on: ubuntu-latest
    name: "test template: ${{matrix.testCase}}"
    needs:
      [
        build-dotnet,
        build-coalesce-vue,
        build-coalesce-vue-vuetify3,
        build-eslint-plugin-coalesce,
      ]
    strategy:
      matrix:
        testCase:
          # Nothing:
          - ""
          # Everything (except tenancy):
          - "--Identity --MicrosoftAuth --GoogleAuth --Passwords --Passkeys --UserPictures --AuditLogs --ExampleModel --DarkMode --TrackingBase --AppInsights --OpenAPI --Hangfire --AIChat --AzureTerraform --KeyVault --BlobStorage --EmailAzure --GithubActions"
          # Assorted partial variants:
          - "--Identity --UserPictures --TrackingBase"
          - "--Identity --MicrosoftAuth --AuditLogs --Hangfire --Passwords --Passkeys"
          # Tenancy variants:
          - "--Identity --Tenancy --TenantCreateExternal --GoogleAuth"
          - "--Identity --Tenancy --TenantCreateSelf --TenantMemberInvites --AuditLogs --Passkeys --EmailSendGrid"
          - "--Identity --Tenancy --TenantCreateAdmin --TenantMemberInvites --MicrosoftAuth --Passwords --EmailAzure"

    defaults:
      run:
        shell: pwsh
        working-directory: ./templates/Coalesce.Vue.Template

    env:
      COALESCE_VERSION: ${{ inputs.COALESCE_VERSION }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet
      - uses: ./.github/actions/setup-js
        with:
          skip-install: "true"

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/artifacts

      - name: Add local nuget source
        run: |
          dotnet nuget add source "${{ github.workspace }}/artifacts/packages" --name "local-nuget"

      # Install the coalesce packages that we just built so we can validate the template against them.
      - name: "Install newly built Coalesce packages"
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          echo $env:COALESCE_VERSION
          ls ${{ github.workspace }}/artifacts -alR

          $filePath = "./content/Directory.Build.props"
          $newVersion = "<CoalesceVersion>$env:COALESCE_VERSION</CoalesceVersion>"
          (Get-Content $filePath) -replace '<CoalesceVersion>.*?<\/CoalesceVersion>', $newVersion | Set-Content $filePath 

          cat $filePath

          cd ./content/*.Web

          # Update package.json to use the newly built packages
          $coalescevuePath = "file:$((Get-ChildItem -Path '${{ github.workspace }}/artifacts/coalesce-vue/*.tgz').FullName)"
          $coalescevuetifyPath = "file:$((Get-ChildItem -Path '${{ github.workspace }}/artifacts/coalesce-vue-vuetify3/*.tgz').FullName)"
          $eslintPluginPath = "file:$((Get-ChildItem -Path '${{ github.workspace }}/artifacts/eslint-plugin-coalesce/*.tgz').FullName)"

          $packageJson = Get-Content package.json | ConvertFrom-Json
          $packageJson.dependencies.'coalesce-vue' = $coalescevuePath
          $packageJson.dependencies.'coalesce-vue-vuetify3' = $coalescevuetifyPath
          $packageJson.devDependencies.'eslint-plugin-coalesce' = $eslintPluginPath
          $packageJson | ConvertTo-Json -Depth 10 | Set-Content package.json

          cat package.json

      - name: TestLocal
        run: ./TestLocal.ps1 ${{ matrix.testCase }}
