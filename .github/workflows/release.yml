name: Release

on:
  workflow_dispatch:
    inputs:
      prereleaseSlug:
        description: "Prerelease slug (optional)"
        required: false
        default: ""
        type: choice
        options:
          - rc
          - beta
          - ""
      skipNuget:
        description: "Skip NuGet publish"
        required: false
        default: false
        type: boolean
      skipNpm:
        description: "Skip npm publish"
        required: false
        default: false
        type: boolean
      skipTemplate:
        description: "Skip template publish"
        required: false
        default: false
        type: boolean

jobs:
  meta:
    uses: ./.github/workflows/part-compute-version.yml
    secrets: inherit
    with:
      prereleaseSlug: ${{ inputs.prereleaseSlug }}
      checkTagIsUnique: true

  build:
    uses: ./.github/workflows/part-build.yml
    secrets: inherit
    needs: meta
    with:
      COALESCE_VERSION: ${{ needs.meta.outputs.COALESCE_VERSION }}

  publish:
    uses: ./.github/workflows/part-publish.yml
    needs: [build]
    secrets: inherit
    with:
      prereleaseSlug: ${{ inputs.prereleaseSlug }}
      skipNuget: ${{ inputs.skipNuget }}
      skipNpm: ${{ inputs.skipNpm }}
      skipTemplate: ${{ inputs.skipTemplate }}

  create-release:
    runs-on: ubuntu-latest
    needs: [meta, publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog for current version
        if: ${{ !inputs.prereleaseSlug }}
        id: changelog
        run: |
          # Extract content between the first # heading and the next # heading
          awk '/^# /{if(found) exit; found=1; next} found' CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        if: ${{ !inputs.prereleaseSlug }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.meta.outputs.COALESCE_VERSION }}" \
            --title "${{ needs.meta.outputs.COALESCE_VERSION }}" \
            --notes-file release_notes.md
