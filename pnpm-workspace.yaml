packages:
  - src/*
  - src/IntelliTect.Coalesce.CodeGeneration.Tests/out
  - playground/*
  - docs

allowBuilds:
  "@parcel/watcher": true
  esbuild: true

overrides:
  js-beautify>glob: "13.0.6"
  vite: "^8.0.10"
  "@ungap/structured-clone": "1.3.2"

packageExtensions:
  "@vue/compiler-core":
    dependencies:
      "@babel/types": "*"

enableGlobalVirtualStore: true

minimumReleaseAgeExclude:
  - joi@18.2.1
  - form-data@4.0.6
  - '@babel/core@7.29.1'
  - js-yaml@3.15.0
